<!DOCTYPE html>
<html>
<head>
  <script>
    // Redireciona rotas SPA para o index dentro do subdiretório
    var prefix = '/idealradios';
    var path = window.location.pathname + window.location.search + window.location.hash;
    if (path.indexOf(prefix) === 0) {
      path = path.slice(prefix.length);
    }
    var normalizedPath = path.startsWith('/') ? path : '/' + path;
    window.location.replace(prefix + '/?p=' + encodeURIComponent(normalizedPath));
  </script>
</head>
</html>
