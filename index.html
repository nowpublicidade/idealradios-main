  <body>
    <div id="root"></div>
    <script>
      // GitHub Pages SPA redirect handler: reads ?p= from 404.html redirect
      (function() {
        var params = new URLSearchParams(window.location.search);
        var redirectPath = params.get('p');
        if (!redirectPath) return;

        var basePath = window.location.pathname.endsWith('/')
          ? window.location.pathname.slice(0, -1)
          : window.location.pathname;
        var normalizedPath = redirectPath.startsWith('/')
          ? redirectPath
          : '/' + redirectPath;

        window.history.replaceState(null, '', basePath + normalizedPath);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
